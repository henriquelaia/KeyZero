services:
  mysql:
    image: mysql:8.0
    container_name: keyzero-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: keyzero_root
      MYSQL_DATABASE: keyzero
      MYSQL_USER: keyzero_user
      MYSQL_PASSWORD: keyzero_pass
    ports:
      - "3307:3306"
    volumes:
      - keyzero_db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pkeyzero_root" ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  keyzero_db_data:
    driver: local
